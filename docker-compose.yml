# RadioManager v2.4.0 Docker Compose (服务器部署)
# 用法: docker compose up -d

services:
  mysql:
    image: mysql:8.0
    container_name: radiomanager_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: radiomanager
      MYSQL_USER: radiomanager
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - radiomanager
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: radiomanager_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - radiomanager
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: radiomanager_backend
    environment:
      DATABASE_MODE: mysql
      DATABASE_URL: mysql+pymysql://radiomanager:${MYSQL_PASSWORD:-password123}@mysql:3306/radiomanager
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      ENABLE_TEST_ACCOUNT: "false"
      DEBUG: "false"
      ENVIRONMENT: production
      # 管理员账号（首次启动自动创建）
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@radiomanager.local}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - radiomanager
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: radiomanager_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - radiomanager
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  radiomanager:
    driver: bridge
